  {id:'a3',name:'Global Logistics Corp',tier:'Strategic',acv:3100000,health:91,nps:10,products:['itsm','itom','csm','fsm','cmdb'],signals:['maturity_ready','nps_promoter','usage_spike','contract'],contacts:[{n:'Lisa Wang',t:'CDO',champ:true},{n:'Robert Taylor',t:'VP Technology',champ:true},{n:'Amanda Foster',t:'SVP Operations',champ:true}]},

const INIT_CSQLS = [
  {id:'CSQL-001',acctId:'a3',type:'platform',status:'engaged',by:'Alex Thompson',date:'2026-01-12',products:['now_assist','aiops'],acv:480000,score:92,signals:['maturity_ready','nps_promoter'],driver:'maturity_progression',timeline:'this_quarter',contact:'Lisa Wang (CDO)',currentState:'Full ITSM/ITOM/CSM/FSM stack at 91% adoption. 3 executive champions. NPS 10.',objectives:'Deploy AI capabilities across service management to reduce MTTR and enable predictive operations.',outcomes:'30% reduction in incident resolution time. 50% auto-resolution via Now Assist. Predictive alerting for 90% of P1 incidents.',solution:'Now Assist for ITSM (auto-resolution) → AIOps for predictive operations → Virtual Agent upgrade with GenAI.'},
  {id:'CSQL-002',acctId:'a1',type:'platform',status:'qualified',by:'Alex Thompson',date:'2026-01-25',products:['grc','virtual_agent'],acv:320000,score:85,signals:['usage_spike','maturity_ready'],driver:'compliance',timeline:'this_quarter',contact:'Sarah Chen (VP Ops)',currentState:'SecOps fully deployed. Active users up 40% as new risk team onboards. No integrated GRC.',objectives:'Consolidate risk management across regulatory compliance, audit, and policy frameworks into single platform.',outcomes:'Eliminate 3 legacy GRC tools ($200K savings). 100% audit trail visibility. 60% reduction in compliance reporting time.',solution:'GRC for integrated risk management → Virtual Agent for employee self-service on compliance queries.'},
  {id:'CSQL-003',acctId:'a4',type:'services',status:'qualifying',by:'Priya Sharma',date:'2026-02-01',products:['hrsd','csm'],acv:210000,score:64,signals:['exec_change','competitor'],driver:'org_change',timeline:'next_quarter',contact:'Sophie Anderson (CIO)',currentState:'New CIO evaluating platform consolidation. Legacy HR system contract expiring Q2. Support health below target.',objectives:'Modernize employee experience and patient portal with unified platform approach.',outcomes:'40% improvement in employee onboarding time. Single HR platform replacing 2 legacy tools. 25% reduction in patient portal tickets.',solution:'HRSD for employee experience → CSM for patient portal. Position as unified platform vs point solutions.'},
  {id:'CSQL-004',acctId:'a5',type:'impact',status:'committed',by:'Priya Sharma',date:'2026-01-18',products:['impact'],acv:350000,score:78,signals:['maturity_ready','feature_req'],driver:'success_milestone',timeline:'immediate',contact:"Kevin O'Brien (VP IT)",currentState:'5-product deployment running smoothly. App Engine usage surging. Need expert guidance for governance at scale.',objectives:'Accelerate time-to-value on SPM rollout and establish App Engine governance framework.',outcomes:'SPM live in 60 days (vs 120 typical). App Engine governance model certified. Dedicated TAM for strategic alignment.',solution:'Impact Premium with dedicated TAM → Expert Services for App Engine governance → Success Accelerators for SPM.'},
];
const QBR_EXTRACT = {customer:'a1',type:'platform',driver:'strategic_initiative',timeline:'this_quarter',contact:'Sarah Chen (VP Ops)',currentState:'Currently managing security incidents in a separate legacy system, causing visibility gaps and delayed response times. Average resolution 12 days.',objectives:'Consolidate security incident management and vulnerability management into single platform. Reduce case resolution time by 35%.',outcomes:'Real-time visibility with automated playbooks. Eliminate $480K in annual licensing costs across 5 legacy tools.',solution:'Security Operations (SecOps) + Customer Service Management (CSM) — addresses security visibility gaps and customer service fragmentation.',products:['secops','csm']};
const fmt = v => v>=1e6?`$${(v/1e6).toFixed(1)}M`:`$${(v/1e3).toFixed(0)}K`;
const hCol = s => s>=80?C.ok:s>=60?C.warn:s>=50?'#e87800':C.crit;
const hLbl = s => s>=80?'Healthy':s>=60?'At Risk':'Critical';
const sCol = s => ({high:C.ok,medium:C.warn,low:C.info}[s]);
const Badge = ({bg,color,children,style:sx}) => <span style={{background:bg,color,padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.3px',whiteSpace:'nowrap',...sx}}>{children}</span>;
const StatusBadge = ({status}) => {const s=STATUSES.find(x=>x.k===status); return s?<Badge bg={s.c+'18'} color={s.c}>{s.l}</Badge>:null;};
const HealthBar = ({score,w=70}) => <div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:w,height:5,background:C.b1,borderRadius:3}}><div style={{width:`${score}%`,height:'100%',background:hCol(score),borderRadius:3,transition:'width .4s'}}/></div><span style={{fontSize:11,fontWeight:600,color:hCol(score),minWidth:22}}>{score}</span></div>;
const ScoreRing = ({score,size=40}) => {const r=size/2-3,ci=2*Math.PI*r,off=ci-(score/100)*ci; return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.b1} strokeWidth="3"/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={hCol(score)} strokeWidth="3" strokeDasharray={ci} strokeDashoffset={off} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:'all .5s'}}/><text x={size/2} y={size/2+4} textAnchor="middle" fill={hCol(score)} fontSize={size*.3} fontWeight="700">{score}</text></svg>;};
const Btn = ({children,variant='primary',small,...p}) => {const st={primary:{background:C.int,color:'#fff'},secondary:{background:C.bg3,color:C.t2},success:{background:C.ok,color:'#fff'},ghost:{background:'transparent',color:C.int}}; return <button style={{border:'none',borderRadius:4,padding:small?'5px 10px':'8px 16px',fontSize:small?11:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit',transition:'opacity .15s',...st[variant]}} {...p}>{children}</button>;};
const Field = ({label,required,hint,children}) => <div style={{marginBottom:14}}><label style={{display:'block',color:C.t2,fontSize:11,marginBottom:4,textTransform:'uppercase',letterSpacing:'.3px',fontWeight:600}}>{label}{required&&<span style={{color:C.crit}}> *</span>}</label>{children}{hint&&<div style={{fontSize:10,color:C.t4,marginTop:2,fontStyle:'italic'}}>{hint}</div>}</div>;
const inp = {width:'100%',padding:'8px 10px',background:C.bg2,border:`1px solid ${C.b1}`,borderRadius:4,color:C.t1,fontSize:13,fontFamily:'inherit',outline:'none',boxShadow:'inset 0 1px 2px rgba(0,0,0,.05)'};
const Card = ({title,children,style:sx}) => <div style={{background:C.bg2,borderRadius:8,border:`1px solid ${C.b1}`,boxShadow:C.sh,marginBottom:16,...sx}}>{title&&<div style={{padding:'12px 16px',borderBottom:`1px solid ${C.b1}`,fontSize:11,fontWeight:600,color:C.t2,textTransform:'uppercase',letterSpacing:'.5px'}}>{title}</div>}<div style={{padding:16}}>{children}</div></div>;

function CSQLApp() {
  const [tab,setTab]=useState('signals');
  const [csqls,setCsqls]=useState(INIT_CSQLS);
  const [detail,setDetail]=useState(null);
  const [acctPanel,setAcctPanel]=useState(null);
  const [successMsg,setSuccessMsg]=useState(null);
  const [f,setF]=useState({acctId:'',type:'',driver:'',timeline:'',contactName:'',currentState:'',objectives:'',outcomes:'',solution:'',products:[]});
  const [aiLoading,setAiLoading]=useState(false);
  const [aiRec,setAiRec]=useState(null);
  const [qbrLoading,setQbrLoading]=useState(false);
  const [qbrResult,setQbrResult]=useState(null);
  const [aiFilled,setAiFilled]=useState([]);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const resetForm=()=>{setF({acctId:'',type:'',driver:'',timeline:'',contactName:'',currentState:'',objectives:'',outcomes:'',solution:'',products:[]});setAiRec(null);setQbrResult(null);setAiFilled([]);};
  const acct=ACCOUNTS.find(a=>a.id===f.acctId);
  const handleQBR=()=>{setQbrLoading(true);setTimeout(()=>{setQbrResult(QBR_EXTRACT);setQbrLoading(false);},2000);};
  const applyQBR=()=>{if(!qbrResult)return;const filled=[];const upd={...f};if(qbrResult.customer){upd.acctId=qbrResult.customer;filled.push('acctId');}if(qbrResult.type){upd.type=qbrResult.type;filled.push('type');}if(qbrResult.driver){upd.driver=qbrResult.driver;filled.push('driver');}if(qbrResult.timeline){upd.timeline=qbrResult.timeline;filled.push('timeline');}if(qbrResult.contact){upd.contactName=qbrResult.contact;filled.push('contactName');}if(qbrResult.currentState){upd.currentState=qbrResult.currentState;filled.push('currentState');}if(qbrResult.objectives){upd.objectives=qbrResult.objectives;filled.push('objectives');}if(qbrResult.outcomes){upd.outcomes=qbrResult.outcomes;filled.push('outcomes');}if(qbrResult.solution){upd.solution=qbrResult.solution;filled.push('solution');}if(qbrResult.products){upd.products=qbrResult.products;filled.push('products');}setF(upd);setAiFilled(filled);setQbrResult(null);setTimeout(()=>setAiFilled([]),4000);};
  const runAI=()=>{if(!acct)return;setAiLoading(true);setTimeout(()=>{const white=PRODUCTS.filter(p=>!acct.products.includes(p.id)).slice(0,3);setAiRec({products:white.map(p=>p.id),whyNow:`${acct.name} health at ${acct.health}% with ${acct.signals.length} active expansion signals. ${acct.signals.includes('maturity_ready')?'Platform maturity indicates next-phase readiness. ':''}${acct.signals.includes('nps_promoter')?'NPS promoter status supports internal advocacy. ':''}${acct.signals.includes('exec_change')?'New executive presents window for strategic repositioning.':''}`,pitch:white.map(p=>p.n).join(' → '),acv:Math.round(acct.acv*.15),confidence:acct.health>80?92:acct.health>60?74:55});setAiLoading(false);},1600);};
  const submit=()=>{if(!f.acctId||!f.type||!f.currentState||!f.objectives||!f.outcomes||!f.solution){alert('Please fill all required fields');return;}const a=ACCOUNTS.find(x=>x.id===f.acctId);const nc={id:`CSQL-${String(csqls.length+5).padStart(3,'0')}`,acctId:f.acctId,type:f.type,status:'new',by:'You',date:new Date().toISOString().split('T')[0],products:f.products.length?f.products:aiRec?.products||[],acv:aiRec?.acv||Math.round((a?.acv||0)*.1),score:Math.round((a?.health||70)*.88),signals:a?.signals?.slice(0,3)||[],driver:f.driver,timeline:f.timeline,contact:f.contactName,currentState:f.currentState,objectives:f.objectives,outcomes:f.outcomes,solution:f.solution};setCsqls(p=>[nc,...p]);setSuccessMsg(nc);resetForm();setTab('pipeline');setTimeout(()=>setSuccessMsg(null),8000);};
  const advance=(id,ns)=>{setCsqls(p=>p.map(c=>c.id===id?{...c,status:ns}:c));if(detail?.id===id)setDetail(p=>({...p,status:ns}));};
  const totalPipe=csqls.reduce((s,c)=>s+c.acv,0);const activeCt=csqls.filter(c=>!['won','lost'].includes(c.status)).length;const wonPipe=csqls.filter(c=>c.status==='won').reduce((s,c)=>s+c.acv,0);
  const allSigs=[];ACCOUNTS.forEach(a=>a.signals.forEach(sId=>{const sig=SIGNALS[sId];if(sig)allSigs.push({...sig,sId,acc:a});}));allSigs.sort((a,b)=>{const w={high:3,medium:2,low:1};return(w[b.s]*b.acc.health)-(w[a.s]*a.acc.health);});
  const TABS=[{k:'signals',l:'Expansion Signals',i:'⚡'},{k:'create',l:'Create CSQL',i:'＋'},{k:'pipeline',l:'Pipeline',i:'◎'},{k:'revenue',l:'Revenue Impact',i:'◈'}];
  const fhl=(field)=>aiFilled.includes(field)?{borderLeft:'3px solid '+C.ok,background:C.ok+'08',transition:'all .4s'}:{};
  return (
    <div style={{display:'flex',minHeight:'100vh',background:C.bg1,fontFamily:"'Helvetica Neue',Arial,sans-serif",color:C.t1}}>
      <aside style={{width:220,flexShrink:0,background:C.bg2,borderRight:`1px solid ${C.b1}`,display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh',boxShadow:'2px 0 8px rgba(0,0,0,.04)'}}>
        <div style={{padding:'16px 16px 12px',borderBottom:`1px solid ${C.b1}`}}><div style={{fontSize:13,fontWeight:700,color:C.t1}}><span style={{color:C.green}}>●</span> ServiceNow</div><div style={{fontSize:10,color:C.t3,marginTop:2}}>CSQL Workspace</div></div>
        <nav style={{padding:'8px 0',flex:1}}>{TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'10px 16px',background:tab===t.k?C.int+'12':'transparent',color:tab===t.k?C.int:C.t2,border:'none',cursor:'pointer',fontSize:13,fontWeight:tab===t.k?600:400,fontFamily:'inherit',borderLeft:tab===t.k?`3px solid ${C.int}`:'3px solid transparent',textAlign:'left',transition:'all .12s'}}><span style={{fontSize:14,width:18,textAlign:'center'}}>{t.i}</span>{t.l}{t.k==='pipeline'&&<span style={{marginLeft:'auto',fontSize:10,color:C.int,fontWeight:700}}>{csqls.length}</span>}</button>)}</nav>
        <div style={{padding:'12px 16px',borderTop:`1px solid ${C.b1}`,display:'flex',alignItems:'center',gap:8}}><div style={{width:28,height:28,borderRadius:'50%',background:C.int+'20',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:C.int}}>AT</div><div><div style={{fontSize:11,fontWeight:600,color:C.t1}}>Alex Thompson</div><div style={{fontSize:9,color:C.t3}}>CSM · 5 Accounts</div></div></div>
      </aside>
      <main style={{flex:1,padding:24,overflowY:'auto'}}>
        {tab==='signals'&&<div><h1 style={{fontSize:20,fontWeight:700,margin:'0 0 4px'}}>Expansion Signals</h1><p style={{fontSize:12,color:C.t3,margin:'0 0 20px'}}>AI-detected signals across your portfolio · Sorted by health × priority</p><div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>{[{l:'High Priority',v:allSigs.filter(s=>s.s==='high').length,c:C.ok},{l:'Medium',v:allSigs.filter(s=>s.s==='medium').length,c:C.warn},{l:'Accounts',v:new Set(allSigs.map(s=>s.acc.id)).size,c:C.int},{l:'CS Pipeline',v:fmt(totalPipe),c:C.green}].map((m,i)=><div key={i} style={{background:C.bg2,borderRadius:8,border:`1px solid ${C.b1}`,boxShadow:C.sh,padding:'12px 16px',borderLeft:`3px solid ${m.c}`}}><div style={{fontSize:10,color:C.t3,textTransform:'uppercase',letterSpacing:'.5px'}}>{m.l}</div><div style={{fontSize:22,fontWeight:700,color:m.c,marginTop:4}}>{m.v}</div></div>)}</div><Card title="Active Signals"><table style={{width:'100%',borderCollapse:'collapse',margin:'-16px',width:'calc(100% + 32px)'}}><thead><tr style={{background:C.green}}>{['Health','Account','Signal','Severity','ACV',''].map((h,i)=><th key={i} style={{padding:'10px 12px',textAlign:i===4?'right':'left',fontSize:10,fontWeight:600,color:'#fff',textTransform:'uppercase'}}>{h}</th>)}</tr></thead><tbody>{allSigs.map((sig,i)=><tr key={i} style={{borderBottom:`1px solid ${C.b1}`,cursor:'pointer'}} onClick={()=>setAcctPanel(sig.acc)}><td style={{padding:'10px 12px'}}><HealthBar score={sig.acc.health}/></td><td style={{padding:'10px 12px'}}><div style={{color:C.t1,fontWeight:600,fontSize:13}}>{sig.acc.name}</div><div style={{color:C.t3,fontSize:10}}>{sig.acc.tier}</div></td><td style={{padding:'10px 12px',color:C.t2,fontSize:12}}>{sig.l}</td><td style={{padding:'10px 12px'}}><Badge bg={sCol(sig.s)+'18'} color={sCol(sig.s)}>{sig.s}</Badge></td><td style={{padding:'10px 12px',textAlign:'right',color:C.green,fontWeight:600,fontSize:13}}>{fmt(sig.acc.acv)}</td><td style={{padding:'10p isplay:'flex',flexWrap:'wrap',gap:3}}>{detail.products.map(pId=>{const p=PRODUCTS.find(x=>x.id===pId);return p?<Badge key={pId} bg={C.int+'12'} color={C.int}>{p.n}</Badge>:null;})}</div></div><div style={{marginBottom:14}}><div style={{fontSize:10,color:C.t3,textTransform:'uppercase',marginBottom:4,fontWeight:600}}>Expansion Signals</div><div style={{display:'flex',flexWrap:'wrap',gap:3}}>{detail.signals.map(sId=>{const sig=SIGNALS[sId];return sig?<Badge key={sId} bg={sCol(sig.s)+'12'} color={sCol(sig.s)}>{sig.l}</Badge>:null;})}</div></div>{[{l:'Current State',v:detail.currentState,c:C.crit},{l:'Objectives',v:detail.objectives,c:C.int},{l:'Desired Outcomes',v:detail.outcomes,c:C.ok},{l:'Recommended Solution',v:detail.solution,c:C.green}].map((sec,i)=>sec.v?<div key={i} style={{background:C.bg3+'60',borderRadius:6,padding:12,marginBottom:10,borderLeft:`3px solid ${sec.c}`}}><div style={{fontSize:10,fontWeight:600,color:sec.c,textTransform:'uppercase',marginBottom:3}}>{sec.l}</div><div style={{fontSize:12,color:C.t2,lineHeight:1.6}}>{sec.v}</div></div>:null)}<div style={{display:'flex',gap:2,flexWrap:'wrap',marginBottom:14,marginTop:4}}>{STATUSES.map((s,i)=><React.Fragment key={s.k}><span style={{padding:'3px 8px',borderRadius:4,fontSize:9,fontWeight:600,background:s.k===detail.status?s.c:'transparent',color:s.k===detail.status?'#fff':C.t4,border:`1px solid ${s.k===detail.status?s.c:C.b1}`}}>{s.l}</span>{i<STATUSES.length-1&&<span style={{color:C.t4,fontSize:9,display:'flex',alignItems:'center'}}>→</span>}</React.Fragment>)}</div><div style={{display:'flex',gap:8,flexWrap:'wrap',borderTop:`1px solid ${C.b1}`,paddingTop:14}}>{(NEXT[detail.status]||[]).map(ns=>{const o=STATUSES.find(s=>s.k===ns);return <button key={ns} onClick={()=>advance(detail.id,ns)} style={{padding:'8px 16px',border:'none',borderRadius:4,background:o.c,color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>→ {o.l}</button>;})}<button onClick={()=>{const a=ACCOUNTS.find(x=>x.id===detail.acctId);const prods=detail.products.map(id=>PRODUCTS.find(p=>p.id===id)?.n).filter(Boolean).join(', ');const email=`Subject: CSQL Handoff — ${a?.name} | ${fmt(detail.acv)} Expansion\n\nCSQL: ${detail.id} | Score: ${detail.score}/100\nAccount: ${a?.name} (${a?.tier}) | Health: ${a?.health}/100\nStakeholder: ${detail.contact||'—'}\nEst ACV: ${fmt(detail.acv)}\nTimeline: ${TIMELINES.find(t=>t.v===detail.timeline)?.l||'—'}\nDriver: ${DRIVERS.find(d=>d.v===detail.driver)?.l||'—'}\n\nPRODUCTS: ${prods}\n\nCURRENT STATE\n${detail.currentState||'—'}\n\nOBJECTIVES\n${detail.objectives||'—'}\n\nDESIRED OUTCOMES\n${detail.outcomes||'—'}\n\nRECOMMENDED SOLUTION\n${detail.solution||'—'}\n\nSIGNALS: ${detail.signals.map(s=>SIGNALS[s]?.l).filter(Boolean).join(', ')}\n\nNEXT STEPS\n1. Discovery call with stakeholder within 7 days\n2. Joint CS-Sales session to validate opportunity\n3. Solution workshop for technical requirements\n4. Business case and ROI analysis\n\nCreated: ${detail.by} · ${detail.date}`;navigator.clipboard?.writeText(email);alert('Handoff email copied!');}} style={{padding:'8px 16px',border:`1px solid ${C.b1}`,borderRadius:4,background:C.bg2,color:C.t2,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit',marginLeft:'auto'}}>📧 Copy Handoff Email</button></div></div></div></div>}
      {acctPanel&&<div style={{position:'fixed',top:0,right:0,bottom:0,width:380,background:C.bg2,borderLeft:`1px solid ${C.b1}`,zIndex:300,overflowY:'auto',padding:20,boxShadow:'-4px 0 16px rgba(0,0,0,.08)'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><div style={{fontSize:16,fontWeight:700}}>{acctPanel.name}</div><button onClick={()=>setAcctPanel(null)} style={{background:'none',border:'none',color:C.t3,cursor:'pointer',fontSize:18}}>✕</button></div><div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}><ScoreRing score={acctPanel.health} size={52}/><div><Badge bg={hCol(acctPanel.health)+'18'} color={hCol(acctPanel.health)}>{hLbl(acctPanel.health)}</Badge><div style={{fontSize:11,color:C.t3,marginTop:3}}>{acctPanel.tier} · NPS {acctPanel.nps} · {fmt(acctPanel.acv)}</div></div></div>{[{l:'Signals',items:acctPanel.signals.map(sId=>{const s=SIGNALS[sId];return s?{n:s.l,c:sCol(s.s)}:null;}).filter(Boolean)},{l:'Products',items:acctPanel.products.map(pId=>{const p=PRODUCTS.find(x=>x.id===pId);return p?{n:p.n,c:C.int}:null;}).filter(Boolean)}].map(sec=><div key={sec.l} style={{marginBottom:12}}><div style={{fontSize:10,color:C.t3,textTransform:'uppercase',letterSpacing:'.3px',marginBottom:4,fontWeight:600}}>{sec.l}</div><div style={{display:'flex',flexWrap:'wrap',gap:3}}>{sec.items.map((it,i)=><Badge key={i} bg={it.c+'14'} color={it.c}>{it.n}</Badge>)}</div></div>)}<div style={{fontSize:10,color:C.t3,textTransform:'uppercase',letterSpacing:'.3px',marginBottom:4,fontWeight:600}}>Stakeholders</div>{acctPanel.contacts.map((c,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,fontSize:12}}><span>{c.champ?'⭐':'👤'}</span><span style={{color:C.t1}}>{c.n}</span><span style={{color:C.t3}}>· {c.t}</span></div>)}<Btn onClick={()=>{set('acctId',acctPanel.id);setAiRec(null);setAcctPanel(null);setTab('create');}} style={{width:'100%',marginTop:14}}>+ Create CSQL for {acctPanel.name}</Btn></div>}
    </div>
  );
}
ReactDOM.render(React.createElement(CSQLApp), document.getElementById('root'));
